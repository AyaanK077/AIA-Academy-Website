# Netlify build configuration for the Al-Ihsan Academy Alumni site.
# When you connect this repo in Netlify, these settings are picked up automatically.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Serverless functions (e.g. the read-only submissions viewer at /submissions).
[functions]
  directory = "netlify/functions"

# Nice fallback for any unknown route
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
